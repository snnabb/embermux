<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmberMux</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mesh-bg"><div class="mesh-blob blob-1"></div><div class="mesh-blob blob-2"></div><div class="mesh-blob blob-3"></div></div>
    <div id="login-page" class="login-page hidden">
        <div class="login-card glass-panel">
            <div class="login-logo"><svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="16" fill="url(#fl)"/><path d="M28 14c-1.5 5-7 9-7 16a7 7 0 0014 0c0-2.5-1.2-4.2-3.5-6 .8 2.5-.8 5-3.5 6 1.8-3.5 0-7-2.5-10.5-.8 2.5-2.5 4.2-4.2 4.2C23 20 25.5 17.5 28 14z" fill="#fff" fill-opacity=".92"/><defs><linearGradient id="fl" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#ea580c"/></linearGradient></defs></svg></div>
            <h1 class="login-title">EmberMux</h1>
            <p class="login-subtitle">Emby 多上游聚合代理</p>
            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="login-username">管理员用户名</label>
                    <input type="text" id="login-username" placeholder="请输入管理员用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">管理员密码</label>
                    <input type="password" id="login-password" placeholder="请输入管理员密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="login-btn"><span class="btn-text">登录</span></button>
                <p id="login-error" class="login-error hidden"></p>
            </form>
        </div>
    </div>
    <div id="app" class="app-layout hidden">
        <aside class="sidebar glass-panel" id="sidebar">
            <div class="sidebar-header">
                <svg width="28" height="28" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="16" fill="url(#sl)"/><path d="M28 14c-1.5 5-7 9-7 16a7 7 0 0014 0c0-2.5-1.2-4.2-3.5-6 .8 2.5-.8 5-3.5 6 1.8-3.5 0-7-2.5-10.5-.8 2.5-2.5 4.2-4.2 4.2C23 20 25.5 17.5 28 14z" fill="#fff" fill-opacity=".92"/><defs><linearGradient id="sl" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#ea580c"/></linearGradient></defs></svg>
                <span class="sidebar-brand">EmberMux</span>
                <button class="theme-toggle" id="theme-toggle" title="切换主题"><svg class="icon-sun" width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg><svg class="icon-moon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg></button>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-page="dashboard"><svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm9 0a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1V4zM3 13a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1v-3zm9 0a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-3z"/></svg>仪表盘</a>
                <a href="#upstreams" class="nav-item" data-page="upstreams"><svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2 5a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm14 1a1 1 0 11-2 0 1 1 0 012 0zM2 13a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2zm14 1a1 1 0 11-2 0 1 1 0 012 0z" clip-rule="evenodd"/></svg>上游管理</a>
                <a href="#proxies" class="nav-item" data-page="proxies"><svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM4.332 8.027a6.012 6.012 0 011.912-2.706C6.512 5.73 6.974 6 7.5 6A1.5 1.5 0 019 7.5V8a2 2 0 004 0 2 2 0 011.523-1.943A5.977 5.977 0 0116 10c0 .34-.028.675-.083 1H15a2 2 0 00-2 2v2.197A5.973 5.973 0 0110 16v-2a2 2 0 00-2-2 2 2 0 01-2-2 2 2 0 00-1.668-1.973z" clip-rule="evenodd"/></svg>网络代理</a>
                <a href="#settings" class="nav-item" data-page="settings"><svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>系统设置</a>
                <a href="#logs" class="nav-item" data-page="logs"><svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>系统日志</a>
                <a href="#about" class="nav-item" data-page="about"><svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>关于</a>
            </nav>
            <div class="sidebar-footer"><button class="btn btn-ghost btn-sm btn-block" id="logout-btn">退出登录</button></div>
        </aside>
        <header class="mobile-header glass-panel"><button class="hamburger" id="menu-toggle"><svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg></button><span class="mobile-brand">EmberMux</span></header>
        <main class="main-content" id="main-content">
            <section id="page-dashboard" class="page"><h2 class="page-title">仪表盘</h2><div class="stats-grid" id="stats-grid"></div><h3 class="section-title">上游状态</h3><div class="card-grid" id="upstream-status-grid"></div></section>
            <section id="page-upstreams" class="page hidden"><div class="page-header"><h2 class="page-title">上游管理</h2><button class="btn btn-primary" id="add-upstream-btn">+ 添加上游</button></div><div class="card-grid" id="upstream-list"></div></section>
            <section id="page-proxies" class="page hidden"><div class="page-header"><h2 class="page-title">网络代理</h2><button class="btn btn-primary" id="add-proxy-btn">+ 添加代理</button></div><div class="card-grid" id="proxy-list"></div></section>
            <section id="page-settings" class="page hidden"><h2 class="page-title">系统设置</h2><div class="settings-card glass-panel" id="settings-form-container"></div></section>
            <section id="page-logs" class="page hidden"><div class="page-header"><h2 class="page-title">系统日志</h2><div class="btn-group"><button class="btn btn-ghost btn-sm" id="logs-refresh-btn">刷新</button><button class="btn btn-ghost btn-sm" id="logs-download-btn">下载</button><button class="btn btn-danger btn-sm" id="logs-clear-btn">清空</button></div></div><div class="log-toolbar glass-panel"><input type="text" id="log-search" class="input-sm" placeholder="搜索日志..."><select id="log-filter" class="input-sm"><option value="">全部级别</option><option value="ERROR">ERROR</option><option value="WARN">WARN</option><option value="INFO">INFO</option><option value="DEBUG">DEBUG</option></select></div><pre class="log-viewer glass-panel" id="log-viewer"></pre></section>
            <section id="page-about" class="page hidden"><h2 class="page-title">关于</h2><div class="about-card glass-panel"><div class="about-logo"><svg width="64" height="64" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="16" fill="url(#al)"/><path d="M28 14c-1.5 5-7 9-7 16a7 7 0 0014 0c0-2.5-1.2-4.2-3.5-6 .8 2.5-.8 5-3.5 6 1.8-3.5 0-7-2.5-10.5-.8 2.5-2.5 4.2-4.2 4.2C23 20 25.5 17.5 28 14z" fill="#fff" fill-opacity=".92"/><defs><linearGradient id="al" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#ea580c"/></linearGradient></defs></svg></div><h1>EmberMux</h1><p class="about-desc">多上游聚合代理与播放回源管理面板</p><div class="about-links"><a href="https://github.com/snnabb/embermux" target="_blank" class="btn btn-ghost">GitHub</a></div><div class="about-tech glass-panel"><h4>技术栈</h4><ul><li>后端：Go + 标准库 net/http</li><li>前端：原生 HTML / CSS / JavaScript</li><li>存储：SQLite (CGO) + YAML 配置</li><li>部署：单二进制 / Docker / Systemd</li></ul></div></div></section>
        </main>
    </div>
    <div id="modal-overlay" class="modal-overlay hidden"><div class="modal glass-panel" id="modal"><div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" id="modal-close">&times;</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"></div></div></div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/app.js"></script>
</body>
</html>
